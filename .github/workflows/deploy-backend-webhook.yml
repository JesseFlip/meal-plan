name: Deploy Backend via Webhook

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/deploy-backend-webhook.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger EC2 Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deployment webhook
        env:
          WEBHOOK_URL: http://50.19.129.245:8003/webhook/deploy
          WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          # Create webhook payload
          PAYLOAD='{"ref":"refs/heads/main","repository":{"name":"meal-plan"}}'

          # Generate signature
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/^.* //')

          # Send webhook request
          RESPONSE=$(curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" \
            -w "\n%{http_code}" \
            -s)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Deployment webhook failed with status $HTTP_CODE"
            exit 1
          fi

          # Check if deployment was successful
          if echo "$BODY" | grep -q '"status":"success"'; then
            echo "✅ Backend deployed successfully!"
          else
            echo "❌ Deployment script failed"
            echo "$BODY"
            exit 1
          fi

      - name: Verify deployment
        run: |
          echo "Waiting for backend to restart..."
          sleep 5

          HEALTH=$(curl -s http://50.19.129.245:8002/api/health || echo "FAILED")

          if echo "$HEALTH" | grep -q "ok"; then
            echo "✅ Backend is healthy"
            echo "$HEALTH"
          else
            echo "⚠️  Backend health check inconclusive"
            echo "$HEALTH"
          fi
